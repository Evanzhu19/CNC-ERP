services:
  erp:
    build:
      context: .
      args:
        # 默认已用国内源（DaoCloud镜像 + npmmirror），国内主机直接 docker compose up -d --build
        # 如需换回官方源：NODE_IMAGE=node:24-alpine NPM_REGISTRY=https://registry.npmjs.org docker compose build
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:24-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    image: cnc-erp:latest
    container_name: cnc-erp
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      # 财务落盘加密密钥（64位hex，可选）：不设则自动生成 data/finance.key。
      # 想让密钥与数据备份分离时在 .env 里设置（换机器必须带上同一把钥匙）。
      - FINANCE_KEY=${FINANCE_KEY:-}
    restart: unless-stopped
    networks:
      - default
      - factory-net

# 与刀具系统共享的网络（80端口网关按容器名 cnc-erp 反代过来）
# 首次使用前先执行一次：docker network create factory-net
networks:
  factory-net:
    external: true
